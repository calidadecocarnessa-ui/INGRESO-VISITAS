<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso de Visitas - EcoCarnes</title>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
}

.scan-box {
  position: relative;
  height: 300px;
  background: black;
  border-radius: 10px;
  overflow: hidden;
}

video, img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.scan-line {
  position: absolute;
  height: 4px;
  width: 100%;
  background: lime;
  top: 0;
  animation: scan 2s infinite;
  display: none;
}

@keyframes scan {
  0% { top: 0 }
  100% { top: 100% }
}

.success {
  color: green;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Ingreso de Visitas</h2>

<div class="scan-box">
  <video id="video" autoplay muted playsinline></video>
  <img id="foto" style="display:none;">
  <div class="scan-line" id="linea"></div>
</div>

<button onclick="activarCamara()">ESCANEAR ROSTRO</button>
<button onclick="resetear()" id="btnReset" style="display:none">REPETIR</button>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="dni" placeholder="DNI">
<input type="text" id="empresa" placeholder="Empresa">

<select id="tipo">
<option>Proveedor</option>
<option>Contratista</option>
<option>Chofer</option>
<option>Auditor</option>
</select>

<input type="text" id="motivo" placeholder="Motivo">

<button onclick="enviar()">REGISTRAR</button>

<div id="mensaje" class="success"></div>

</div>

<script>
const SCRIPT_URL = "PEGÁ_ACÁ_TU_LINK";

let stream = null;
let fotoBase64 = "";

async function activarCamara(){
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    document.getElementById("linea").style.display = "block";

    setTimeout(() => {
      capturar();
    }, 2000);

  } catch {
    alert("No se pudo usar la cámara");
  }
}

function capturar(){
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);

  fotoBase64 = canvas.toDataURL();

  foto.src = fotoBase64;
  foto.style.display = "block";
  video.style.display = "none";

  document.getElementById("linea").style.display = "none";
  document.getElementById("btnReset").style.display = "block";
}

function resetear(){
  foto.style.display = "none";
  video.style.display = "block";
  document.getElementById("btnReset").style.display = "none";
}

function enviar(){
  fetch(SCRIPT_URL, {
    method:"POST",
    body: JSON.stringify({
      nombre: nombre.value,
      dni: dni.value,
      empresa: empresa.value,
      tipo: tipo.value,
      motivo: motivo.value
    })
  })
  .then(r => r.text())
  .then(() => {
    mensaje.innerText = "✅ Guardado en Drive";
  });
}
</script>

</body>
</html>
